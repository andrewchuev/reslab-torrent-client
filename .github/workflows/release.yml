name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: produces .msi and NSIS .exe installer
          - platform: windows-latest
            args: ''

          # macOS Universal: Intel + Apple Silicon in one binary
          - platform: macos-latest
            args: '--target universal-apple-darwin'

          # Linux: produces .deb and .AppImage
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS Universal needs both targets
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Torrent Client ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `.msi` (recommended) or `.exe` |
            | macOS    | `.dmg` (Universal: Intel + Apple Silicon) |
            | Linux    | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |

            > **Note:** On macOS, if you see "unidentified developer" — right-click the app → Open.
            > On Windows, SmartScreen may warn about unknown publisher — click "More info" → Run anyway.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}
          prerelease: false
          args: ${{ matrix.args }}
